<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApartmentData • Locator Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .card { transition: all 0.2s ease; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    .nav-btn { position: relative; }
    .segmented { display: flex; background: #f1f1f1; border-radius: 9999px; padding: 4px; }
    .segmented button { flex: 1; padding: 10px 20px; border-radius: 9999px; font-weight: 500; transition: all 0.2s; }
    .segmented button.active { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen overflow-hidden">

  <!-- Login Screen -->
  <div id="login-screen" class="min-h-screen bg-zinc-950 flex items-center justify-center">
    <div class="bg-zinc-900 p-12 rounded-3xl w-full max-w-lg text-center">
      <div class="mb-12">
        <div class="w-20 h-20 mx-auto bg-emerald-500 rounded-3xl flex items-center justify-center text-white text-4xl font-bold">A</div>
        <h2 class="text-4xl font-semibold mt-6 tracking-tight">ApartmentData Portal</h2>
        <p class="text-zinc-400 mt-3 text-lg">Sign in to continue</p>
      </div>
      <div class="space-y-4">
        <button onclick="quickLogin('Admin')" class="w-full bg-emerald-500 hover:bg-emerald-600 py-6 rounded-3xl font-semibold text-xl">Log in as Admin</button>
        <button onclick="quickLogin('Manager')" class="w-full bg-emerald-500 hover:bg-emerald-600 py-6 rounded-3xl font-semibold text-xl">Log in as Manager</button>
        <button onclick="quickLogin('Agent')" class="w-full bg-emerald-500 hover:bg-emerald-600 py-6 rounded-3xl font-semibold text-xl">Log in as Agent</button>
        <button onclick="quickLogin('InvoiceAdmin')" class="w-full bg-amber-500 hover:bg-amber-600 py-6 rounded-3xl font-semibold text-xl">Log in as Invoice Administrator</button>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="hidden flex flex-col h-screen">
    <header class="bg-blue-600 text-white px-8 py-4 flex items-center justify-between">
      <nav id="main-nav" class="flex gap-8 text-sm font-medium"></nav>
      <div class="flex items-center gap-6">
        <div class="flex items-center gap-2 bg-white/10 px-4 py-1 rounded-3xl text-sm">
          <span class="text-xs font-medium">MARKET</span>
          <select id="market-select" onchange="changeMarket()" class="bg-transparent focus:outline-none font-semibold"></select>
        </div>
        <div id="user-name" class="font-medium"></div>
        <div id="user-role" class="text-xs bg-blue-700 px-3 py-1 rounded-full"></div>
        <button onclick="logout()" class="hover:text-red-300"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </header>
    <div class="flex-1 overflow-auto p-8 bg-white text-zinc-900" id="main-content"></div>
  </div>

  <!-- Shareable List Modal -->
  <div id="share-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl w-full max-w-lg p-8">
      <h2 class="text-2xl font-semibold mb-6">Your Shareable List is Ready</h2>
      <div class="bg-emerald-50 border border-emerald-200 rounded-3xl p-6 mb-6">
        <p class="text-sm text-emerald-700">Link expires in 48 hours</p>
        <p id="share-link" class="font-mono text-emerald-600 break-all mt-2 text-lg"></p>
      </div>
      <div class="flex gap-4">
        <button onclick="sendViaText()" class="flex-1 bg-blue-600 text-white py-5 rounded-3xl font-medium">Send via Text</button>
        <button onclick="sendViaEmail()" class="flex-1 bg-emerald-600 text-white py-5 rounded-3xl font-medium">Send via Email</button>
      </div>
      <button onclick="hideShareModal()" class="w-full mt-4 border py-5 rounded-3xl">Close</button>
    </div>
  </div>

  <script>
    let currentUser = null;
    let currentMarket = localStorage.getItem('currentMarket') || 'Austin';
    let properties = JSON.parse(localStorage.getItem('properties')) || [
      {id:1, name:"Treehouse", address:"748 N LBJ Dr, San Marcos", submarket:"Georgetown", built:"2023", beds:"1-3", baths:"1-2", rent:"$1,049 - $1,999", sqft:"618 - 1377", commission:"150%", bonus:"225%"},
      {id:2, name:"Treehouse (formerly Woodmeade)", address:"2501 Wickersham Ln, Austin", submarket:"Far East", built:"2025", beds:"1-2", baths:"1-2", rent:"$1,232 - $1,743", sqft:"696 - 1174", commission:"200%", bonus:"200%"},
      {id:3, name:"The Olivine", address:"29600 Ronald Reagan Blvd, Georgetown", submarket:"Georgetown", built:"2023", beds:"1-3", baths:"1-2", rent:"$1,049 - $1,999", sqft:"618 - 1377", commission:"150%", bonus:"225%"}
    ];

    // ... (previous getMessages, countUnreadMessages, updateMessageBadge functions remain the same)

    function quickLogin(role) {
      // ... (same as before)
      buildNavigation();
      populateMarketSelector();
      navigate('dashboard');
    }

    function buildNavigation() {
      // ... (same Agent vs Admin/Manager navigation order as last version)
    }

    function navigate(page) {
      let html = '';
      if (page === 'search') {
        html = `
          <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-8">
              <h1 class="text-4xl font-semibold">Search — ${currentMarket} Market</h1>
              ${(currentUser.role === 'Admin' || currentUser.role === 'Manager') ? `
                <div class="flex gap-3">
                  <button onclick="showAddPropertyModal()" class="bg-emerald-600 text-white px-6 py-3 rounded-3xl flex items-center gap-2"><i class="fas fa-plus"></i> Add New Property</button>
                  <button onclick="showWebsiteModal()" class="bg-blue-600 text-white px-6 py-3 rounded-3xl flex items-center gap-2"><i class="fas fa-globe"></i> Add from Website</button>
                  <button onclick="showTeachAIModal()" class="bg-violet-600 text-white px-6 py-3 rounded-3xl flex items-center gap-2"><i class="fas fa-brain"></i> Teach the AI</button>
                  <button onclick="showManageAIModal()" class="bg-amber-600 text-white px-6 py-3 rounded-3xl flex items-center gap-2"><i class="fas fa-cog"></i> Manage AI Knowledge</button>
                </div>` : ''}
            </div>

            <!-- AI Scout -->
            <div class="mb-8 bg-white border rounded-3xl p-2 flex items-center">
              <input id="ai-scout-input" class="flex-1 bg-transparent px-6 py-5 text-lg focus:outline-none" placeholder="Ask anything... e.g. 2 bedroom under $1000 in 78741 with washer dryer available mid to late July" onkeypress="if(event.key==='Enter') runAIScout()">
              <button onclick="runAIScout()" class="bg-emerald-600 text-white px-8 py-5 rounded-3xl font-medium">Search with AI</button>
            </div>

            <!-- Advanced Manual Search (clean version) -->
            <div class="bg-white border rounded-3xl p-8 mb-12">
              <!-- ... same clean advanced manual search as before ... -->
            </div>

            <!-- RESULTS SECTION (new) -->
            <div id="results-section" class="hidden">
              <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-semibold">Results</h2>
                <div class="flex gap-4">
                  <button onclick="selectAll()" class="border px-6 py-3 rounded-3xl">Select All</button>
                  <button onclick="showSelectedOnly()" class="border px-6 py-3 rounded-3xl">Selected Only</button>
                  <button onclick="createShareableList()" class="bg-emerald-600 text-white px-8 py-3 rounded-3xl">Create Shareable List</button>
                </div>
              </div>

              <!-- Quick Property Search Bar -->
              <div class="mb-6">
                <input id="quick-add-input" onkeyup="if(event.key==='Enter') quickAddProperty()" 
                       class="w-full border rounded-3xl px-6 py-5 text-lg focus:outline-none" 
                       placeholder="Quick add property... e.g. Treeh...">
              </div>

              <div id="results-table" class="bg-white border rounded-3xl overflow-hidden">
                <!-- Populated by JS -->
              </div>
            </div>
          </div>`;
      }
      // ... (other pages unchanged)
      document.getElementById('main-content').innerHTML = html;
    }

    // NEW: Run AI or Advanced search → show results
    function runAIScout() {
      const query = document.getElementById('ai-scout-input').value || "1-1 under $900 with w/d in 78744";
      showResults(query);
    }

    function runAdvancedSearch() {
      showResults("Advanced search results");
    }

    function showResults(query) {
      const resultsHTML = properties.map(p => `
        <div class="flex items-center px-8 py-6 border-b last:border-none">
          <input type="checkbox" class="w-5 h-5 accent-emerald-600" data-id="${p.id}">
          <div class="ml-6 flex-1">
            <div class="font-semibold">${p.name}</div>
            <div class="text-sm text-zinc-500">${p.address}</div>
          </div>
          <div class="text-right text-sm">
            <div>${p.beds} bed • ${p.baths} bath</div>
            <div class="font-medium">${p.rent}</div>
          </div>
        </div>`).join('');
      
      document.getElementById('results-table').innerHTML = resultsHTML;
      document.getElementById('results-section').classList.remove('hidden');
    }

    function quickAddProperty() {
      const input = document.getElementById('quick-add-input').value.trim().toLowerCase();
      if (!input) return;
      const matches = properties.filter(p => p.name.toLowerCase().includes(input));
      if (matches.length > 0) {
        alert(`✅ Added "${matches[0].name}" to results`);
        // In real version we would re-render results with the new property
      } else {
        alert("No matching property found");
      }
    }

    function selectAll() {
      alert("✅ All properties selected");
    }

    function showSelectedOnly() {
      alert("✅ Showing only selected properties");
    }

    function createShareableList() {
      const link = `https://veilhub.app/list/${Math.random().toString(36).substring(2, 10)}`;
      document.getElementById('share-link').textContent = link + " (expires in 48 hours)";
      document.getElementById('share-modal').classList.remove('hidden');
    }

    function hideShareModal() {
      document.getElementById('share-modal').classList.add('hidden');
    }

    function sendViaText() {
      alert("✅ List link copied to clipboard and ready to text!");
      hideShareModal();
    }

    function sendViaEmail() {
      alert("✅ List link ready to email!");
      hideShareModal();
    }

    // ... (rest of your existing functions stay exactly the same)
  </script>
</body>
</html>
