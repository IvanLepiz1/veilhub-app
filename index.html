<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApartmentData • Locator Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .card { transition: all 0.2s ease; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    .nav-btn { position: relative; }
    .segmented { display: flex; background: #f1f1f1; border-radius: 9999px; padding: 4px; }
    .segmented button { flex: 1; padding: 10px 20px; border-radius: 9999px; font-weight: 500; transition: all 0.2s; }
    .segmented button.active { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen overflow-hidden">

  <!-- Login Screen -->
  <div id="login-screen" class="min-h-screen bg-zinc-950 flex items-center justify-center">
    <div class="bg-zinc-900 p-12 rounded-3xl w-full max-w-lg text-center">
      <div class="mb-12">
        <div class="w-20 h-20 mx-auto bg-emerald-500 rounded-3xl flex items-center justify-center text-white text-4xl font-bold">A</div>
        <h2 class="text-4xl font-semibold mt-6 tracking-tight">ApartmentData Portal</h2>
        <p class="text-zinc-400 mt-3 text-lg">Sign in to continue</p>
      </div>
      <div class="space-y-4">
        <button onclick="quickLogin('Admin')" class="w-full bg-emerald-500 hover:bg-emerald-600 py-6 rounded-3xl font-semibold text-xl">Log in as Admin</button>
        <button onclick="quickLogin('Manager')" class="w-full bg-emerald-500 hover:bg-emerald-600 py-6 rounded-3xl font-semibold text-xl">Log in as Manager</button>
        <button onclick="quickLogin('Agent')" class="w-full bg-emerald-500 hover:bg-emerald-600 py-6 rounded-3xl font-semibold text-xl">Log in as Agent</button>
        <button onclick="quickLogin('InvoiceAdmin')" class="w-full bg-amber-500 hover:bg-amber-600 py-6 rounded-3xl font-semibold text-xl">Log in as Invoice Administrator</button>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="hidden flex flex-col h-screen">
    <header class="bg-blue-600 text-white px-8 py-4 flex items-center justify-between">
      <nav id="main-nav" class="flex gap-8 text-sm font-medium"></nav>
      <div class="flex items-center gap-6">
        <div class="flex items-center gap-2 bg-white/10 px-4 py-1 rounded-3xl text-sm">
          <span class="text-xs font-medium">MARKET</span>
          <select id="market-select" onchange="changeMarket()" class="bg-transparent focus:outline-none font-semibold"></select>
        </div>
        <div id="user-name" class="font-medium"></div>
        <div id="user-role" class="text-xs bg-blue-700 px-3 py-1 rounded-full"></div>
        <button onclick="logout()" class="hover:text-red-300"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </header>
    <div class="flex-1 overflow-auto p-8 bg-white text-zinc-900" id="main-content"></div>
  </div>

  <script>
    let currentUser = null;
    let currentMarket = localStorage.getItem('currentMarket') || 'Austin';

    const teamMembers = [
      {id:1, name:"Alex Rivera", role:"Admin"},
      {id:2, name:"Sarah Chen", role:"Manager"},
      {id:3, name:"Mike Torres", role:"Agent"},
      {id:4, name:"Maria Lopez", role:"Invoice Administrator"}
    ];

    let properties = JSON.parse(localStorage.getItem('properties')) || [/* your existing properties */];

    function getMessages() { /* same as before */ }
    function countUnreadMessages() { /* same */ }
    function updateMessageBadge() { /* same */ }

    function quickLogin(role) {
      currentUser = role === "Admin" ? teamMembers[0] : role === "Manager" ? teamMembers[1] : role === "InvoiceAdmin" ? teamMembers[3] : teamMembers[2];
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      document.getElementById('user-name').textContent = currentUser.name;
      document.getElementById('user-role').textContent = currentUser.role;

      buildNavigation();
      populateMarketSelector();
      navigate('dashboard');
    }

    function buildNavigation() {
      const nav = document.getElementById('main-nav');
      let navHTML = '';

      if (currentUser.role === 'Agent') {
        navHTML = `Home Search Clients Sent Lists Follow-Ups Messages`;
      } else {
        navHTML = `
          <button onclick="navigate('dashboard')" class="nav-btn hover:underline">Home</button>
          <button onclick="navigate('search')" class="nav-btn hover:underline font-semibold">Search</button>
          <button onclick="navigate('clients')" class="nav-btn hover:underline">Clients</button>
          <button onclick="navigate('sendlist')" class="nav-btn hover:underline">Sent Lists</button>
          <button onclick="navigate('followups')" class="nav-btn hover:underline">Follow-Ups</button>
          <button onclick="navigate('messages')" id="messages-btn" class="nav-btn hover:underline relative">Messages <span id="message-badge" class="absolute -top-1 -right-2 bg-red-600 text-white text-[10px] font-bold rounded-full h-4 w-4 flex items-center justify-center"></span></button>
          <button onclick="navigate('commissions')" class="nav-btn hover:underline">Commissions</button>
          <button onclick="navigate('emailupdates')" class="nav-btn hover:underline">AI Email Updates</button>
          <button onclick="navigate('team')" class="nav-btn hover:underline">Team</button>
          <button onclick="navigate('diagnostics')" class="nav-btn hover:underline">Diagnostics</button>`;
      }
      nav.innerHTML = navHTML;
      updateMessageBadge();
    }

    function navigate(page) {
      let html = '';
      if (page === 'diagnostics') {
        html = `
          <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-8">
              <h1 class="text-4xl font-semibold">System Self-Diagnostics</h1>
              <button onclick="runFullDiagnostics()" class="bg-emerald-600 text-white px-8 py-4 rounded-3xl flex items-center gap-3 font-medium">
                <i class="fas fa-sync"></i> Run Full Diagnostics Now
              </button>
            </div>
            <div id="diagnostics-content" class="space-y-8"></div>
          </div>`;
      } else if (page === 'search') {
        // ... your existing clean search + results code ...
      }
      // ... other pages unchanged ...
      document.getElementById('main-content').innerHTML = html;
      if (page === 'diagnostics') runFullDiagnostics();
    }

    function runFullDiagnostics() {
      let issues = [];
      // Example real checks
      if (properties.length < 5) issues.push({severity:"yellow", title:"Low property count", desc:"Only " + properties.length + " properties in database. Consider adding more.", fix:"Add from Website"});
      // Add more checks based on your data...

      let html = `<div class="grid grid-cols-3 gap-6">`;
      // Status cards + issues list
      html += `</div>`;
      document.getElementById('diagnostics-content').innerHTML = html;
    }

    // ... rest of your existing functions (runAIScout, createShareableList, etc.) remain exactly the same
  </script>
</body>
</html>
