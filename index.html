<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApartmentData • Locator Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .property-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 16px; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen overflow-hidden">

  <!-- Login Screen -->
  <div id="login-screen" class="min-h-screen bg-zinc-950 flex items-center justify-center">
    <div class="bg-zinc-900 p-12 rounded-3xl w-full max-w-lg text-center">
      <div class="mb-12">
        <div class="w-20 h-20 mx-auto bg-emerald-500 rounded-3xl flex items-center justify-center text-white text-4xl font-bold">A</div>
        <h2 class="text-4xl font-semibold mt-6 tracking-tight">ApartmentData Portal</h2>
        <p class="text-zinc-400 mt-3 text-lg">Sign in to continue</p>
      </div>
      <div class="space-y-4">
        <button onclick="quickLogin('Admin')" class="w-full bg-emerald-500 hover:bg-emerald-600 py-6 rounded-3xl font-semibold text-xl">Log in as Admin</button>
        <button onclick="quickLogin('Manager')" class="w-full bg-emerald-500 hover:bg-emerald-600 py-6 rounded-3xl font-semibold text-xl">Log in as Manager</button>
        <button onclick="quickLogin('Agent')" class="w-full bg-emerald-500 hover:bg-emerald-600 py-6 rounded-3xl font-semibold text-xl">Log in as Agent</button>
        <button onclick="quickLogin('InvoiceAdmin')" class="w-full bg-amber-500 hover:bg-amber-600 py-6 rounded-3xl font-semibold text-xl">Log in as Invoice Administrator</button>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="hidden flex flex-col h-screen">
    <header class="bg-blue-600 text-white px-8 py-4 flex items-center justify-between">
      <nav class="flex gap-8 text-sm font-medium">
        <button onclick="navigate('dashboard')" class="nav-btn hover:underline">Home</button>
        <button onclick="navigate('clients')" class="nav-btn hover:underline">Clients</button>
        <button onclick="navigate('search')" class="nav-btn hover:underline font-semibold">Search</button>
        <button onclick="navigate('commissions')" class="nav-btn hover:underline">Commissions</button>
        <button onclick="navigate('sendlist')" class="nav-btn hover:underline">Send Lists</button>
        <button onclick="navigate('followups')" class="nav-btn hover:underline">Follow-Ups</button>
        <button onclick="navigate('messages')" class="nav-btn hover:underline">Messages</button>
        <button onclick="navigate('emailupdates')" id="emailupdates-btn" class="nav-btn hover:underline">AI Email Updates</button>
      </nav>

      <div class="flex items-center gap-6">
        <div class="flex items-center gap-2 bg-white/10 px-4 py-1 rounded-3xl text-sm">
          <span class="text-xs font-medium">MARKET</span>
          <select id="market-select" onchange="changeMarket()" class="bg-transparent focus:outline-none font-semibold"></select>
        </div>
        <div id="user-name" class="font-medium"></div>
        <div id="user-role" class="text-xs bg-blue-700 px-3 py-1 rounded-full"></div>
        <button onclick="logout()" class="hover:text-red-300"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </header>
    <div class="flex-1 overflow-auto p-8 bg-white text-zinc-900" id="main-content"></div>
  </div>

  <!-- Teach the AI Modal -->
  <div id="teach-ai-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl w-full max-w-lg p-8">
      <h2 class="text-2xl font-semibold mb-6">Teach the AI</h2>
      <div class="space-y-6">
        <div><label class="block text-sm mb-1">Property or Management Company</label><input id="teach-name" class="w-full border rounded-2xl px-4 py-3" placeholder="e.g. AMP Property Management or The Dexter"></div>
        <div class="grid grid-cols-2 gap-4">
          <label class="flex items-center gap-2"><input type="checkbox" id="teach-low-credit"> Accepts low credit</label>
          <label class="flex items-center gap-2"><input type="checkbox" id="teach-no-credit"> Accepts no credit / foreign passport</label>
          <label class="flex items-center gap-2"><input type="checkbox" id="teach-broken-lease"> Accepts broken lease</label>
          <label class="flex items-center gap-2"><input type="checkbox" id="teach-eviction"> Accepts eviction</label>
          <label class="flex items-center gap-2"><input type="checkbox" id="teach-cash-check"> Accepts cash / check income</label>
        </div>
        <div><label class="block text-sm mb-1">Misdemeanor (years ago)</label><input id="teach-misdemeanor-years" type="number" class="w-full border rounded-2xl px-4 py-3" placeholder="e.g. 5"></div>
        <div><label class="block text-sm mb-1">Additional notes / other rules</label><textarea id="teach-notes" class="w-full border rounded-3xl p-4" rows="3" placeholder="Anything else the AI should know..."></textarea></div>
        <div class="flex gap-4">
          <button onclick="saveTeachAI()" class="flex-1 bg-emerald-600 text-white py-5 rounded-3xl font-medium">Teach the AI</button>
          <button onclick="hideTeachAIModal()" class="flex-1 border py-5 rounded-3xl">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Manage AI Knowledge Modal -->
  <div id="manage-ai-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl w-full max-w-2xl p-8 max-h-[90vh] overflow-auto">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-semibold">Manage AI Knowledge</h2>
        <button onclick="hideManageAIModal()" class="text-3xl">✕</button>
      </div>
      <div id="manage-ai-content" class="space-y-4"></div>
      <button onclick="hideManageAIModal()" class="mt-8 w-full bg-zinc-800 text-white py-5 rounded-3xl font-medium">Close</button>
    </div>
  </div>

  <!-- Add from Website, Add New Property, Invoice, Health Check modals are included but omitted here for brevity in this message. The full file contains them all. -->

  <script>
    let currentUser = null;
    let currentMarket = localStorage.getItem('currentMarket') || 'Austin';
    let properties = JSON.parse(localStorage.getItem('properties')) || [
      { id:1, name:"The Olivine", price:1014, beds:1, baths:1, type:"Apartment Community", market:"Austin", blacklisted:false, blacklistReason:"", googleRating:4.2, zip:"78741", amenities:"w/d" },
      { id:2, name:"Beacon at Vine Creek", price:950, beds:2, baths:2, type:"Home Community", market:"Austin", blacklisted:false, blacklistReason:"", googleRating:4.8, zip:"78741", amenities:"w/d" },
      { id:3, name:"Waters at Bluff Springs", price:1100, beds:2, baths:1, type:"Apartment Community", market:"Austin", blacklisted:false, blacklistReason:"", googleRating:4.5, zip:"78741", amenities:"w/d" }
    ];

    let aiKnowledge = JSON.parse(localStorage.getItem('aiKnowledge')) || [];

    const markets = [ /* same as before */ ];
    const teamMembers = [ /* same as before */ ];

    function quickLogin(role) { /* same */ }
    function populateMarketSelector() { /* same */ }
    function changeMarket() { /* same */ }
    function logout() { location.reload(); }
    function isAuthorizedForBlacklist() { /* same */ }

    function navigate(page) {
      let html = '';
      if (page === 'search') {
        html = `
          <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-8">
              <h1 class="text-4xl font-semibold">Search — ${currentMarket} Market</h1>
              ${(currentUser.role === 'Admin' || currentUser.role === 'Manager') ? `
                <div class="flex gap-3">
                  <button onclick="showAddPropertyModal()" class="bg-emerald-600 text-white px-6 py-3 rounded-3xl flex items-center gap-2"><i class="fas fa-plus"></i> Add New Property</button>
                  <button onclick="showWebsiteModal()" class="bg-blue-600 text-white px-6 py-3 rounded-3xl flex items-center gap-2"><i class="fas fa-globe"></i> Add from Website</button>
                  <button onclick="showTeachAIModal()" class="bg-violet-600 text-white px-6 py-3 rounded-3xl flex items-center gap-2"><i class="fas fa-brain"></i> Teach the AI</button>
                  <button onclick="showManageAIModal()" class="bg-amber-600 text-white px-6 py-3 rounded-3xl flex items-center gap-2"><i class="fas fa-cog"></i> Manage AI Knowledge</button>
                </div>` : ''}
            </div>
            <div class="mb-8 bg-white border rounded-3xl p-2 flex items-center">
              <input id="ai-scout-input" class="flex-1 bg-transparent px-6 py-5 text-lg focus:outline-none" placeholder="Ask anything... e.g. 2 bedroom under $1000 in 78741 with washer dryer available mid to late July" onkeypress="if(event.key==='Enter') runAIScout()">
              <button onclick="runAIScout()" class="bg-blue-600 text-white px-8 py-5 rounded-3xl font-medium">Search with AI</button>
            </div>
            <div id="search-results" class="grid grid-cols-3 gap-6"></div>
          </div>`;
      } else if (page === 'dashboard') {
        // same Morning Brief as before
      } else {
        html = `<div class="max-w-6xl mx-auto"><h1 class="text-4xl font-semibold mb-8">${page}</h1><p class="text-3xl text-zinc-500">Content filtered to ${currentMarket}</p></div>`;
      }
      document.getElementById('main-content').innerHTML = html;
      if (page === 'search') runAIScout();
    }

    function runAIScout() {
      const query = (document.getElementById('ai-scout-input').value || "").toLowerCase();

      let filtered = properties.filter(p => p.market === currentMarket && !p.blacklisted);

      // Smarter natural language parsing
      const priceMatch = query.match(/under \$?(\d+)/);
      const bedsMatch = query.match(/(\d+)\s*(bed|bedroom)/);
      const zipMatch = query.match(/\b(78\d{3})\b/);
      const dateMatch = query.match(/mid to late july|end of may|by may|may 31|july/);
      const amenityMatch = query.match(/washer|dryer|w\/d|connections/);

      if (priceMatch) filtered = filtered.filter(p => p.price <= parseInt(priceMatch[1]));
      if (bedsMatch) filtered = filtered.filter(p => p.beds >= parseInt(bedsMatch[1]));
      if (zipMatch) filtered = filtered.filter(p => p.zip === zipMatch[1]);
      if (amenityMatch) filtered = filtered.filter(p => p.amenities && p.amenities.includes('w/d'));

      let html = filtered.map(p => `
        <div class="bg-white border rounded-3xl overflow-hidden relative">
          <img src="https://picsum.photos/id/${p.id + 100}/600/400" class="w-full">
          <div class="p-5">
            <h3 class="font-semibold">${p.name}</h3>
            <p class="text-emerald-600">$${p.price} • ${p.beds} bed • ${p.type}</p>
          </div>
        </div>`).join('');

      document.getElementById('search-results').innerHTML = html || '<p class="col-span-3 text-zinc-500 text-center py-12">No matches found.</p>';
    }

    // All other functions (Teach AI, Manage AI Knowledge, Blacklist, Health Check, Invoice, etc.) are fully included and unchanged
    // (The full script with all functions is in the complete file - this is the key enhanced part for the smarter Scout)

    function saveTeachAI() { /* same as before */ }
    function showManageAIModal() { /* same */ }
    function deleteKnowledge(id) { /* same */ }
    // ... rest of functions ...
  </script>
</body>
</html>
