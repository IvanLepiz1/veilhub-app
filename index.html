<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApartmentData • Locator Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .property-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 16px; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen overflow-hidden">

  <!-- Login Screen -->
  <div id="login-screen" class="min-h-screen bg-zinc-950 flex items-center justify-center">
    <div class="bg-zinc-900 p-12 rounded-3xl w-full max-w-lg text-center">
      <div class="mb-12">
        <div class="w-20 h-20 mx-auto bg-emerald-500 rounded-3xl flex items-center justify-center text-white text-4xl font-bold">A</div>
        <h2 class="text-4xl font-semibold mt-6 tracking-tight">ApartmentData Portal</h2>
        <p class="text-zinc-400 mt-3 text-lg">Sign in to continue</p>
      </div>
      <div class="space-y-4">
        <button onclick="quickLogin('Admin')" class="w-full bg-emerald-500 hover:bg-emerald-600 py-6 rounded-3xl font-semibold text-xl">Log in as Admin</button>
        <button onclick="quickLogin('Manager')" class="w-full bg-emerald-500 hover:bg-emerald-600 py-6 rounded-3xl font-semibold text-xl">Log in as Manager</button>
        <button onclick="quickLogin('Agent')" class="w-full bg-emerald-500 hover:bg-emerald-600 py-6 rounded-3xl font-semibold text-xl">Log in as Agent</button>
        <button onclick="quickLogin('InvoiceAdmin')" class="w-full bg-amber-500 hover:bg-amber-600 py-6 rounded-3xl font-semibold text-xl">Log in as Invoice Administrator</button>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="hidden flex flex-col h-screen">
    <header class="bg-blue-600 text-white px-8 py-4 flex items-center justify-between">
      <nav class="flex gap-8 text-sm font-medium">
        <button onclick="navigate('dashboard')" class="nav-btn hover:underline">Home</button>
        <button onclick="navigate('clients')" class="nav-btn hover:underline">Clients</button>
        <button onclick="navigate('search')" class="nav-btn hover:underline font-semibold">Search</button>
        <button onclick="navigate('commissions')" class="nav-btn hover:underline">Commissions</button>
        <button onclick="navigate('sendlist')" class="nav-btn hover:underline">Send Lists</button>
        <button onclick="navigate('followups')" class="nav-btn hover:underline">Follow-Ups</button>
        <button onclick="navigate('messages')" class="nav-btn hover:underline">Messages</button>
        <button onclick="navigate('emailupdates')" id="emailupdates-btn" class="nav-btn hover:underline">AI Email Updates</button>
      </nav>

      <div class="flex items-center gap-6">
        <div class="flex items-center gap-2 bg-white/10 px-4 py-1 rounded-3xl text-sm">
          <span class="text-xs font-medium">MARKET</span>
          <select id="market-select" onchange="changeMarket()" class="bg-transparent focus:outline-none font-semibold"></select>
        </div>
        <div id="user-name" class="font-medium"></div>
        <div id="user-role" class="text-xs bg-blue-700 px-3 py-1 rounded-full"></div>
        <button onclick="logout()" class="hover:text-red-300"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </header>
    <div class="flex-1 overflow-auto p-8 bg-white text-zinc-900" id="main-content"></div>
  </div>

  <!-- Add from Website Modal -->
  <div id="website-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl w-full max-w-lg p-8">
      <h2 class="text-2xl font-semibold mb-6">Add Property from Website</h2>
      <input id="website-url" class="w-full border rounded-2xl px-4 py-3 mb-6" placeholder="Paste full website URL" value="https://livebh.com/apartments/vine-creek-rental-homes">
      <button onclick="extractFromWebsite()" class="w-full bg-emerald-600 text-white py-5 rounded-3xl font-medium">AI Extract All Features & Amenities</button>
      <div id="extract-result" class="hidden mt-6 p-6 bg-zinc-100 rounded-3xl"></div>
      <div class="flex gap-4 mt-6">
        <button onclick="hideWebsiteModal()" class="flex-1 border py-5 rounded-3xl">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Add New Property Modal -->
  <div id="add-property-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl w-full max-w-md p-8">
      <h2 class="text-2xl font-semibold mb-6">Add New Property</h2>
      <div class="space-y-6">
        <div><label class="block text-sm mb-1">Property Name</label><input id="new-name" class="w-full border rounded-2xl px-4 py-3" placeholder="Beacon at Vine Creek"></div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-sm mb-1">Price</label><input id="new-price" type="number" class="w-full border rounded-2xl px-4 py-3" placeholder="2075"></div>
          <div><label class="block text-sm mb-1">Beds</label><input id="new-beds" type="number" class="w-full border rounded-2xl px-4 py-3" placeholder="3"></div>
        </div>
        <div><label class="block text-sm mb-1">Baths</label><input id="new-baths" type="number" class="w-full border rounded-2xl px-4 py-3" placeholder="2"></div>
        <div><label class="block text-sm mb-1">Property Type</label>
          <select id="new-type" class="w-full border rounded-2xl px-4 py-3">
            <option value="Apartment Community">Apartment Community</option>
            <option value="Home Community" selected>Home Community</option>
            <option value="Townhome Community">Townhome Community</option>
          </select>
        </div>
        <div class="flex gap-4">
          <button onclick="saveNewProperty()" class="flex-1 bg-emerald-600 text-white py-5 rounded-3xl font-medium">Save Property</button>
          <button onclick="hideAddPropertyModal()" class="flex-1 border py-5 rounded-3xl">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Invoice Modal -->
  <div id="invoice-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl w-full max-w-6xl max-h-[95vh] flex flex-col overflow-hidden">
      <div class="p-6 border-b flex justify-between bg-zinc-50">
        <h2 class="text-2xl font-semibold">Create / Edit Invoice</h2>
        <button onclick="hideInvoiceModal()" class="text-3xl">✕</button>
      </div>
      <div class="flex flex-1 overflow-auto p-8 gap-8">
        <div class="flex-1 space-y-6">
          <div><label class="block text-sm mb-1">Property to be invoiced</label><select id="inv-property-select" onchange="autoFillProperty()" class="w-full border rounded-2xl px-4 py-3"></select></div>
          <div><label class="block text-sm mb-1">Property Leased</label><input id="inv-property" class="w-full border rounded-2xl px-4 py-3" readonly></div>
          <div><label class="block text-sm mb-1">Client's name</label><select id="inv-client-select" onchange="autoFillClient()" class="w-full border rounded-2xl px-4 py-3"></select></div>
          <div><label class="block text-sm mb-1">Client's name (filled)</label><input id="inv-client" class="w-full border rounded-2xl px-4 py-3" readonly></div>
          <div><label class="block text-sm mb-1">Mail Payment To</label><textarea id="inv-mail-to" class="w-full border rounded-3xl p-4 text-sm" rows="3">Austin Area Apartment Locators, Inc.\nPO Box 42135\nAustin TX 78704\n(512) 586-9231\nBilling@AustinAALocators.com</textarea></div>
          <div><label class="block text-sm mb-1">Invoice Body</label><textarea id="inv-body" class="w-full border rounded-3xl p-4 text-sm" rows="6">To whom it may concern:\nPlease find this invoice for my efforts helping this client lease one of your units. It was a pleasure working with you.\nFor Any Questions about this Invoice Please Call:\n\nAustin Area Apartment Locators, Inc.\nPo Box 42135\nAustin TX, 78704\n(512) 586-9231\nBilling@AustinAALocators.com\n\nRegards,\nIvan Lepiz</textarea></div>
          <div class="grid grid-cols-2 gap-6">
            <div><label class="block text-sm mb-1">PO Number</label><input id="inv-po" class="w-full border rounded-2xl px-4 py-3"></div>
            <div><label class="block text-sm mb-1">Custom</label><input id="inv-custom" class="w-full border rounded-2xl px-4 py-3"></div>
            <div><label class="block text-sm mb-1">Unit number leased</label><input id="inv-unit" class="w-full border rounded-2xl px-4 py-3"></div>
            <div class="flex items-center gap-2"><input type="checkbox" id="inv-trec"><label class="text-sm">Include My TREC # on the Invoice</label></div>
          </div>
        </div>
        <div class="w-80 space-y-6">
          <div><label class="block text-sm mb-1">Invoice #</label><input id="inv-number" class="w-full border rounded-2xl px-4 py-3" value="000001" readonly></div>
          <div><label class="block text-sm mb-1">Application date</label><input id="inv-application-date" type="date" class="w-full border rounded-2xl px-4 py-3"></div>
          <div><label class="block text-sm mb-1">Move In Date</label><input id="inv-move-in-date" type="date" class="w-full border rounded-2xl px-4 py-3"></div>
          <div><label class="block text-sm mb-1">Paid On</label><input id="inv-paid-on" type="date" class="w-full border rounded-2xl px-4 py-3"></div>
          <div class="border rounded-3xl p-6 bg-zinc-50">
            <h3 class="font-semibold mb-4">Commission</h3>
            <div class="space-y-4">
              <div><label class="block text-sm mb-1">Rent Amount</label><input id="inv-rent" type="number" class="w-full border rounded-2xl px-4 py-3"></div>
              <div><label class="block text-sm mb-1">Commission Rate</label><input id="inv-comm-rate" type="number" class="w-full border rounded-2xl px-4 py-3" value="100"></div>
              <div><label class="block text-sm mb-1">Bonus</label><input id="inv-bonus" type="number" class="w-full border rounded-2xl px-4 py-3" value="0"></div>
              <button onclick="computeTotal()" class="w-full bg-blue-600 text-white py-3 rounded-2xl">Compute</button>
              <div class="text-right"><span class="text-sm text-zinc-500">Total Due:</span><span id="total-due" class="text-3xl font-bold text-emerald-600">$0.00</span></div>
            </div>
          </div>
          <div><label class="block text-sm mb-1">Internal Notes</label><textarea id="inv-notes" class="w-full border rounded-3xl p-4" rows="4"></textarea></div>
          <button onclick="generateInvoice()" class="w-full bg-emerald-600 text-white py-5 rounded-3xl font-medium">Save & Print Invoice</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;
    let currentMarket = localStorage.getItem('currentMarket') || 'Austin';
    let properties = JSON.parse(localStorage.getItem('properties')) || [
      { id:1, name:"The Olivine", price:1014, beds:1, baths:1, type:"Apartment Community", market:"Austin" },
      { id:2, name:"Beacon at Vine Creek", price:2075, beds:3, baths:2, type:"Home Community", market:"Austin" }
    ];

    const markets = [
      { name: "Austin", cities: ["Austin", "Buda", "Kyle", "San Marcos", "Round Rock", "Pflugerville", "Hutto", "Cedar Park", "Del Valle"] },
      { name: "Houston", cities: ["Houston", "Katy", "Sugar Land", "The Woodlands"] },
      { name: "San Antonio", cities: ["San Antonio", "New Braunfels"] },
      { name: "Dallas", cities: ["Dallas", "Fort Worth", "Plano", "Irving"] }
    ];

    const teamMembers = [
      {id:1, name:"Alex Rivera", role:"Admin"},
      {id:2, name:"Sarah Chen", role:"Manager"},
      {id:3, name:"Mike Torres", role:"Agent"},
      {id:4, name:"Maria Lopez", role:"Invoice Administrator"}
    ];

    function quickLogin(role) {
      currentUser = role === "Admin" ? teamMembers[0] : 
                    role === "Manager" ? teamMembers[1] : 
                    role === "InvoiceAdmin" ? teamMembers[3] : teamMembers[2];
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      document.getElementById('user-name').textContent = currentUser.name;
      document.getElementById('user-role').textContent = currentUser.role;
      document.getElementById('emailupdates-btn').classList.toggle('hidden', currentUser.role === 'Agent');
      populateMarketSelector();
      navigate('dashboard');
    }

    function populateMarketSelector() {
      const select = document.getElementById('market-select');
      select.innerHTML = markets.map(m => `<option value="${m.name}" ${m.name === currentMarket ? 'selected' : ''}>${m.name}</option>`).join('');
    }

    function changeMarket() {
      currentMarket = document.getElementById('market-select').value;
      localStorage.setItem('currentMarket', currentMarket);
      alert(`✅ Switched to ${currentMarket} Market`);
      navigate('search');
    }

    function logout() { location.reload(); }

    function navigate(page) {
      let html = '';
      if (page === 'dashboard') {
        html = `<div class="max-w-4xl mx-auto text-center pt-12"><h1 class="text-5xl font-semibold mb-4">Good morning, ${currentUser.name.split(' ')[0]} 👋</h1><p class="text-xl text-zinc-600 mb-8">Top matches in ${currentMarket}</p><div class="grid grid-cols-3 gap-6">` + properties.filter(p => p.market === currentMarket).map(p => `<div onclick="createSendListFromSuggestion(${p.id})" class="bg-white border rounded-3xl p-6 cursor-pointer"><img src="https://picsum.photos/id/${p.id + 100}/600/400" class="w-full h-40 object-cover rounded-2xl mb-4"><h3 class="font-semibold">${p.name}</h3><p class="text-emerald-600">$${p.price} • ${p.beds} bed • ${p.type}</p></div>`).join('') + `</div></div>`;
      } else if (page === 'search') {
        html = `
          <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-8">
              <h1 class="text-4xl font-semibold">Search — ${currentMarket} Market</h1>
              ${(currentUser.role === 'Admin' || currentUser.role === 'Manager') ? `
                <div class="flex gap-3">
                  <button onclick="showAddPropertyModal()" class="bg-emerald-600 text-white px-6 py-3 rounded-3xl flex items-center gap-2"><i class="fas fa-plus"></i> Add New Property</button>
                  <button onclick="showWebsiteModal()" class="bg-blue-600 text-white px-6 py-3 rounded-3xl flex items-center gap-2"><i class="fas fa-globe"></i> Add from Website</button>
                </div>` : ''}
            </div>
            <div class="mb-8 bg-white border rounded-3xl p-2 flex items-center">
              <input id="ai-scout-input" class="flex-1 bg-transparent px-6 py-5 text-lg focus:outline-none" placeholder="Ask anything..." onkeypress="if(event.key==='Enter') runAIScout()">
              <button onclick="runAIScout()" class="bg-blue-600 text-white px-8 py-5 rounded-3xl font-medium">Search with AI</button>
            </div>
            <div id="search-results" class="grid grid-cols-3 gap-6"></div>
          </div>`;
      } else if (page === 'emailupdates') {
        html = `
          <div class="max-w-6xl mx-auto">
            <h1 class="text-4xl font-semibold mb-8">AI Email Updates & Daily Sync</h1>
            <div class="bg-white border rounded-3xl p-8 mb-8">
              <h2 class="text-2xl font-semibold mb-4">Run Daily AI Sync (simulates 2 AM update)</h2>
              <button onclick="runDailyAISync()" class="bg-emerald-600 text-white px-8 py-5 rounded-3xl text-lg">Run Daily AI Sync at 2 AM</button>
              <p class="text-sm text-zinc-500 mt-4">This updates only prices, availability, and specials. Static fields are protected.</p>
            </div>
            <div class="bg-white border rounded-3xl p-8">
              <h2 class="text-2xl font-semibold mb-4">AI Email Inbox</h2>
              <textarea id="email-input" class="w-full h-64 border rounded-3xl p-6" placeholder="Paste a property email here..."></textarea>
              <button onclick="parseEmailUpdate()" class="mt-6 bg-blue-600 text-white px-8 py-5 rounded-3xl">Parse Email & Update Database</button>
            </div>
          </div>`;
      } else {
        html = `<div class="max-w-6xl mx-auto"><h1 class="text-4xl font-semibold mb-8">${page}</h1><p class="text-3xl text-zinc-500">Content filtered to ${currentMarket}</p></div>`;
      }
      document.getElementById('main-content').innerHTML = html;
    }

    function runDailyAISync() {
      alert("✅ Daily AI Sync completed at 2 AM.\nUpdated prices, availability, and specials for all properties in " + currentMarket + ".\nStatic fields protected.");
    }

    function parseEmailUpdate() {
      const email = document.getElementById('email-input').value;
      if (email.includes("price") || email.includes("special") || email.includes("available")) {
        alert("✅ AI parsed email and safely updated dynamic fields.");
      } else {
        alert("✅ Email received — no dynamic changes detected.");
      }
    }

    function runAIScout() {
      const query = (document.getElementById('ai-scout-input').value || "").toLowerCase();
      const filtered = properties.filter(p => p.market === currentMarket);
      let html = filtered.map(p => `<div class="bg-white border rounded-3xl overflow-hidden"><img src="https://picsum.photos/id/${p.id + 100}/600/400" class="w-full"><div class="p-5"><h3 class="font-semibold">${p.name}</h3><p class="text-emerald-600">$${p.price} • ${p.beds} bed • ${p.type}</p></div></div>`).join('');
      document.getElementById('search-results').innerHTML = html || '<p class="col-span-3 text-zinc-500 text-center py-12">No matches found.</p>';
    }

    function showWebsiteModal() {
      document.getElementById('website-modal').classList.remove('hidden');
    }

    function hideWebsiteModal() {
      document.getElementById('website-modal').classList.add('hidden');
    }

    function extractFromWebsite() {
      const url = document.getElementById('website-url').value;
      const extracted = {
        name: "Beacon at Vine Creek",
        price: 2075,
        beds: 3,
        baths: 2,
        type: "Home Community",
        market: "Austin"
      };
      document.getElementById('extract-result').innerHTML = `
        <p class="font-semibold">${extracted.name}</p>
        <p>$${extracted.price} • ${extracted.beds} bed / ${extracted.baths} bath • ${extracted.type}</p>
        <button onclick="saveExtracted(${JSON.stringify(extracted)})" class="mt-6 w-full bg-emerald-600 text-white py-4 rounded-3xl">Save to Database</button>
      `;
      document.getElementById('extract-result').classList.remove('hidden');
    }

    function saveExtracted(data) {
      const newProp = { id: Date.now(), name: data.name, price: data.price, beds: data.beds, baths: data.baths, type: data.type, market: data.market };
      properties.push(newProp);
      localStorage.setItem('properties', JSON.stringify(properties));
      hideWebsiteModal();
      alert(`✅ ${data.name} added with all features & amenities!`);
      navigate('search');
    }

    function showAddPropertyModal() { document.getElementById('add-property-modal').classList.remove('hidden'); }
    function hideAddPropertyModal() { document.getElementById('add-property-modal').classList.add('hidden'); }
    function saveNewProperty() {
      const name = document.getElementById('new-name').value;
      const price = parseFloat(document.getElementById('new-price').value);
      const beds = parseFloat(document.getElementById('new-beds').value);
      const baths = parseFloat(document.getElementById('new-baths').value);
      const type = document.getElementById('new-type').value;
      if (!name || !price) return alert("Please fill Name and Price");
      const newProp = { id: Date.now(), name, price, beds, baths, type, market: currentMarket };
      properties.push(newProp);
      localStorage.setItem('properties', JSON.stringify(properties));
      hideAddPropertyModal();
      alert(`✅ Property "${name}" added!`);
      navigate('search');
    }

    function logLease(id) { alert("✅ Lease logged"); navigate('commissions'); }
    function createSendListFromSuggestion(id) { alert(`✅ Send List created`); navigate('sendlist'); }
    function markLeased(id) { document.getElementById('invoice-modal').classList.remove('hidden'); }
    function hideInvoiceModal() { document.getElementById('invoice-modal').classList.add('hidden'); }
    function generateInvoice() { hideInvoiceModal(); alert("✅ Invoice saved"); navigate('commissions'); }
    function computeTotal() { document.getElementById('total-due').textContent = '$1,099'; }
    function autoFillProperty() {}
    function autoFillClient() {}
  </script>
</body>
</html>
